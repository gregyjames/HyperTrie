version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/src/hypertrie"
    schedule:
      interval: "daily"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dotnet-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-dependencies:
        patterns:
          - "*"
