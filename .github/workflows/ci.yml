name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-feature=+aes,+sse2"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: src/hypertrie

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src/hypertrie

      - name: Rust Tests
        run: cargo test
        working-directory: src/hypertrie

  csharp-ci:
    name: C# CI
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-feature=+aes,+sse2"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev gcc g++

      - name: Install Rust (for native lib)
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Test via Nuke
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh BuildRustSingle --rust-target x86_64-unknown-linux-gnu --runtime-id linux-x64 --lib-name libhypertrie.so
          ./build.sh Test --configuration Release
