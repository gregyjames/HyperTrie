name: CI

on:
  push:
  pull_request:

jobs:
  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-feature=+aes,+sse2"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
          
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: src/hypertrie

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src/hypertrie

      - name: Rust Tests + Coverage
        run: cargo llvm-cov --all-features --codecov --output-path codecov.json
        working-directory: src/hypertrie

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v6
        with:
          files: src/hypertrie/codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: rust
  
  csharp-ci:
    name: C# CI
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-feature=+aes,+sse2"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev gcc g++

      - name: Install Rust (for native lib)
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Test via Nuke
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh BuildRustSingle --rust-target x86_64-unknown-linux-gnu --runtime-id linux-x64 --lib-name libhypertrie.so
          ./build.sh Test --configuration Release

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          report_type: coverage
          files: 'artifacts/**/coverage.cobertura.xml'
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: csharp
