name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-rust:
    strategy:
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: libhypertrie.so
            runtime_id: linux-x64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            lib_name: hypertrie.dll
            runtime_id: windows-x64
          - platform: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            lib_name: hypertrie.dll
            runtime_id: windows-x86
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libhypertrie.dylib
            runtime_id: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '6.0.0'

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v3.0.0
        id: gitversion

      - name: Build Rust Library via Nuke
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh BuildRustSingle \
            --rust-target ${{ matrix.target }} \
            --runtime-id ${{ matrix.runtime_id }} \
            --lib-name ${{ matrix.lib_name }} \
            --version ${{ steps.gitversion.outputs.nuGetVersionV2 }}

      - name: Upload Library
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.platform }}
          path: HyperTrieCore/target/release/${{ matrix.runtime_id }}

  build-nuget:
    needs: [build-rust]
    runs-on: ubuntu-latest
    if: always() && needs.build-rust.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download all native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: native-lib-*
          path: HyperTrieCore/target/release
          merge-multiple: false

      - name: Reorganize artifacts
        shell: bash
        run: |
          cd HyperTrieCore/target/release
          for dir in native-lib-*; do
            platform="${dir#native-lib-}"
            case "$platform" in
              linux-x64)    rid="linux-x64" ;;
              windows-x64)  rid="windows-x64" ;;
              windows-x86)  rid="windows-x86" ;;
              macos-arm64)  rid="osx-arm64" ;;
            esac
            if [ -d "$dir" ] && [ "$dir" != "$rid" ]; then
              mkdir -p "$rid"
              cp -r "$dir"/* "$rid"/
            fi
          done
          echo "Final layout:"
          find . -type f | sort

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '6.0.0'

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v3.0.0
        id: gitversion

      - name: Build, Pack, and Publish via Nuke
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./build.sh
          ./build.sh PublishNuGet PublishGitHub \
            --configuration Release \
            --nu-get-api-key "$NUGET_API_KEY" \
            --version ${{ steps.gitversion.outputs.nuGetVersionV2 }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: HyperTrieCore/src/HyperTrieCore/bin/Release/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}