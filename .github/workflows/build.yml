name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-rust:
    strategy:
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: libhypertrie.so
            runtime_id: linux-x64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            lib_name: hypertrie.dll
            runtime_id: windows-x64
          - platform: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            lib_name: hypertrie.dll
            runtime_id: windows-x86
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libhypertrie.dylib
            runtime_id: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib libssl-dev gcc g++

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build Rust Library via Nuke
        shell: bash
        run: |
          chmod +x ./build.sh
          # Extract version organically directly from the pushed tag (e.g., v1.0.32-beta.4 -> 1.0.32-beta.4)
          VERSION="${GITHUB_REF_NAME#v}"
          CLEAN_VERSION="${VERSION//_/-}"
          ./build.sh BuildRustSingle \
            --rust-target ${{ matrix.target }} \
            --runtime-id ${{ matrix.runtime_id }} \
            --lib-name ${{ matrix.lib_name }} \
            --version "$CLEAN_VERSION"

      - name: Upload Library
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.runtime_id }}
          path: src/HyperTrieCore/runtimes/${{ matrix.runtime_id }}

  build-nuget:
    needs: [build-rust]
    runs-on: ubuntu-latest
    if: always() && needs.build-rust.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Download all native libraries
        uses: actions/download-artifact@v8
        with:
          path: src/HyperTrieCore/runtimes
          merge-multiple: false

      - name: Build, Pack, and Publish via Nuke
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./build.sh
          VERSION="${GITHUB_REF_NAME#v}"
          CLEAN_VERSION="${VERSION//_/-}"
          ./build.sh PublishNuGet PublishGitHub \
            --configuration Release \
            --nu-get-api-key "$NUGET_API_KEY" \
            --version "$CLEAN_VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/packages/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}